<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Escolha um grafo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #f5f5f0;
      color: #1a1a1a;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
    }

    h1 {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: #1a1a1a;
    }

    .options {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .options a { text-decoration: none; }

    .options button {
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      padding: 0.5rem 1.25rem;
      border-radius: 8px;
      border: 1px solid #e0deda;
      background: #ffffff;
      color: #1a1a1a;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, transform 0.1s;
    }

    .options button:hover {
      border-color: #4f6ef7;
      color: #4f6ef7;
    }

    .options button:active { transform: scale(0.97); }
  </style>
</head>
<body>

  <h1>Escolha um grafo</h1>

  <div class="options">
    <a href="/app/Teste"><button>Grafo de Teste</button></a>
    <a href="/app/Codigo"><button>Grafo de Codigo</button></a>
  </div>

</body>
</html>
